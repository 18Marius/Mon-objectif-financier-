<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EducXP — Knowledge Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
:root{
  --bg:#06061A;--bg2:#0B0B24;--sur:#10102E;--brd:#282855;
  --txt:#F0F0FF;--txt2:#6464A0;--purple:#9B6DFF;--gold:#F59E0B;
  --green:#28D882;--red:#FF5252;--cyan:#18D4F0;--blue:#4D9EFF;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);font:13px/1.5 'Inter','Segoe UI',system-ui,sans-serif;overflow:hidden}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(6,6,26,.92);border-bottom:1px solid rgba(155,109,255,.15);z-index:100;display:flex;align-items:center;padding:0 20px;gap:16px;backdrop-filter:blur(20px)}
#hdr-logo{font-size:17px;font-weight:900;background:linear-gradient(135deg,#9B6DFF,#4D9EFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
#hdr-title{font-size:12px;color:var(--txt2);letter-spacing:.08em}
#search{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;color:var(--txt);padding:6px 14px;font-size:12px;outline:none;width:200px;font-family:inherit}
#search:focus{border-color:rgba(155,109,255,.5)}
#hdr-stats{font-size:11px;color:var(--txt2);margin-left:auto;display:flex;gap:16px;white-space:nowrap}
#hdr-stats span{display:flex;align-items:center;gap:5px}

/* LEGEND */
#legend{position:fixed;top:64px;left:16px;z-index:50;background:rgba(10,10,35,.9);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;backdrop-filter:blur(12px);font-size:11px;min-width:140px}
#legend h3{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--txt2);margin-bottom:2px}
.leg{display:flex;align-items:center;gap:8px;cursor:pointer;opacity:.85;transition:opacity .2s}
.leg:hover{opacity:1}
.leg.dim{opacity:.3}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* FILTERS */
#filters{position:fixed;top:64px;right:16px;z-index:50;background:rgba(10,10,35,.9);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px;backdrop-filter:blur(12px);font-size:11px;max-height:calc(100vh - 80px);overflow-y:auto;min-width:120px}
#filters h3{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--txt2);margin-bottom:2px}
.fchk{display:flex;align-items:center;gap:7px;cursor:pointer}
.fchk input{cursor:pointer;accent-color:var(--purple)}

/* DETAIL PANEL */
#panel{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,35,.95);border-top:1px solid rgba(255,255,255,.08);padding:14px 20px;z-index:50;display:none;backdrop-filter:blur(16px);max-height:200px;overflow-y:auto}
#panel.open{display:block}
#panel-title{font-size:15px;font-weight:700;margin-bottom:6px}
#panel-meta{font-size:11px;color:var(--txt2);margin-bottom:8px}
#panel-conns{display:flex;flex-wrap:wrap;gap:6px}
.pconn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer}
.pconn:hover{border-color:rgba(155,109,255,.5)}
#panel-close{position:absolute;top:12px;right:16px;background:rgba(255,255,255,.08);border:none;color:var(--txt2);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

/* SVG */
#graph-wrap{position:fixed;inset:52px 0 0 0}
svg{width:100%;height:100%}
.node circle{cursor:pointer;transition:r .2s}
.node circle:hover{filter:brightness(1.3)}
.node text{pointer-events:none;font-size:10px;fill:#D0D0EE;font-family:'Inter',system-ui,sans-serif;text-anchor:middle}
.link{stroke-opacity:.45}
.link.dim{stroke-opacity:.08}
.node.dim{opacity:.15}
.node.hl circle{filter:brightness(1.5) drop-shadow(0 0 8px currentColor)}

/* Tooltip */
#tip{position:fixed;background:rgba(10,10,35,.95);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:9px 13px;font-size:12px;pointer-events:none;z-index:200;display:none;backdrop-filter:blur(10px);max-width:220px;line-height:1.55}
#tip b{display:block;margin-bottom:3px;color:#fff}
#tip small{color:var(--txt2)}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-logo">⚡ EduXP</div>
  <div id="hdr-title">Knowledge Graph — index.html</div>
  <input id="search" placeholder="Rechercher un nœud..." oninput="onSearch(this.value)">
  <div id="hdr-stats">

    <span style="color:var(--txt2)">Clic = détails · Drag = déplacer · Scroll = zoom</span>
  </div>
</div>

<div id="legend">
  <h3>Types</h3>
</div>

<div id="filters">
  <h3>Clusters</h3>
</div>

<div id="graph-wrap"><svg id="svg"></svg></div>
<div id="tip"></div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-title"></div>
  <div id="panel-meta"></div>
  <div id="panel-conns"></div>

simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(edges).id(d => d.id).distance(90).strength(.4))
  .force('charge', d3.forceManyBody().strength(-200))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collide', d3.forceCollide().radius(d => (d.size||8) + 18))
  .on('tick', ticked);

function ticked() {
  linkEl
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeG.attr('transform', d => `translate(${d.x},${d.y})`);

svg.on('click', () => { highlighted = null; clearHighlight(); closePanel(); });

// ── LEGEND (types) ──────────────────────────────────────────────
const leg = document.getElementById('legend');
Object.entries(TYPE_COLORS).forEach(([type, color]) => {
  const row = document.createElement('div');
  row.className = 'leg';
  row.dataset.type = type;
  row.innerHTML = `<div class="leg-dot" style="background:${color}"></div><span>${type}</span>`;
  row.onclick = () => toggleType(type, row);
  leg.appendChild(row);
});

// ── FILTERS (clusters) ──────────────────────────────────────────
const filt = document.getElementById('filters');
Object.entries(CLUSTER_COLORS).forEach(([cl, color]) => {
  const row = document.createElement('label');
  row.className = 'fchk';
  row.innerHTML = `<input type="checkbox" checked> <span style="color:${color}">${cl}</span>`;
  row.querySelector('input').onchange = (e) => toggleCluster(cl, e.target.checked);
  filt.appendChild(row);
});

// ── INTERACTIONS ────────────────────────────────────────────────
function toggleType(type, el) {
  if (activeTypes.has(type)) { activeTypes.delete(type); el.classList.add('dim'); }
  else { activeTypes.add(type); el.classList.remove('dim'); }
  applyFilter();
}

function toggleCluster(cl, on) {
  if (on) activeClusters.add(cl); else activeClusters.delete(cl);
  applyFilter();
}

function applyFilter() {
  const visNodes = new Set(nodes.filter(d => activeTypes.has(d.type) && activeClusters.has(d.cluster)).map(d => d.id));
  nodeG.classed('dim', d => !visNodes.has(d.id));
  linkEl.classed('dim', d => !visNodes.has(d.source.id) || !visNodes.has(d.target.id));
}

function selectNode(d) {
  highlighted = d.id;
  const connIds = new Set();
  edges.forEach(e => {
    const sid = typeof e.source==='object' ? e.source.id : e.source;
    const tid = typeof e.target==='object' ? e.target.id : e.target;
    if (sid === d.id) connIds.add(tid);
    if (tid === d.id) connIds.add(sid);
  });

  nodeG.classed('hl', n => n.id === d.id);
  nodeG.classed('dim', n => n.id !== d.id && !connIds.has(n.id));
  linkEl.classed('dim', e => {
    const sid = typeof e.source==='object' ? e.source.id : e.source;
    const tid = typeof e.target==='object' ? e.target.id : e.target;
    return sid !== d.id && tid !== d.id;
  });

  // Panel
  const outgoing = edges.filter(e => (typeof e.source==='object'?e.source.id:e.source)===d.id);
  const incoming = edges.filter(e => (typeof e.target==='object'?e.target.id:e.target)===d.id);
  document.getElementById('panel-title').innerHTML = `<span style="color:${TYPE_COLORS[d.type]}">${d.type.toUpperCase()}</span> — ${d.label}`;
  document.getElementById('panel-meta').textContent = `Cluster: ${d.cluster} · ${outgoing.length} sortants · ${incoming.length} entrants · taille: ${d.size}`;

  const connsEl = document.getElementById('panel-conns');
  connsEl.innerHTML = '';

  if (outgoing.length) {
    const lbl = document.createElement('span');
    lbl.style.cssText = 'color:var(--txt2);font-size:10px;margin-right:4px';
    lbl.textContent = 'Appelle:';
    connsEl.appendChild(lbl);
    outgoing.forEach(e => {
      const tid = typeof e.target==='object' ? e.target.id : e.target;
      const tNode = nodes.find(n => n.id === tid);
      if (!tNode) return;
      const btn = document.createElement('span');
      btn.className = 'pconn';
      btn.style.borderColor = CLUSTER_COLORS[tNode.cluster];
      btn.textContent = tNode.label;
      btn.onclick = () => selectNode(tNode);
      connsEl.appendChild(btn);
    });
  }
  if (incoming.length) {
    const lbl = document.createElement('span');
    lbl.style.cssText = 'color:var(--txt2);font-size:10px;margin-right:4px;margin-top:6px;display:block';
    lbl.textContent = 'Appelé par:';
    connsEl.appendChild(lbl);
    incoming.forEach(e => {
      const sid = typeof e.source==='object' ? e.source.id : e.source;
      const sNode = nodes.find(n => n.id === sid);
      if (!sNode) return;
      const btn = document.createElement('span');
      btn.className = 'pconn';
      btn.style.borderColor = CLUSTER_COLORS[sNode.cluster];
      btn.textContent = sNode.label;
      btn.onclick = () => selectNode(sNode);
      connsEl.appendChild(btn);
    });
  }

  document.getElementById('panel').classList.add('open');
}

function clearHighlight() {
  nodeG.classed('dim', false).classed('hl', false);
  linkEl.classed('dim', false);
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  clearHighlight();
}

// ── SEARCH ──────────────────────────────────────────────────────
function onSearch(q) {
  if (!q) { clearHighlight(); return; }
  const lq = q.toLowerCase();
  const matches = nodes.filter(d => d.label.toLowerCase().includes(lq) || d.id.toLowerCase().includes(lq) || d.cluster.toLowerCase().includes(lq));
  const matchIds = new Set(matches.map(d => d.id));
  nodeG.classed('dim', d => !matchIds.has(d.id));
  linkEl.classed('dim', e => {
    const sid = typeof e.source==='object' ? e.source.id : e.source;
    const tid = typeof e.target==='object' ? e.target.id : e.target;
    return !matchIds.has(sid) && !matchIds.has(tid);
  });
  if (matches.length === 1) selectNode(matches[0]);
}

// ── TOOLTIP ─────────────────────────────────────────────────────
const tip = document.getElementById('tip');
function showTip(e, d) {
  const inDeg = edges.filter(ev => (typeof ev.target==='object'?ev.target.id:ev.target)===d.id).length;
  const outDeg = edges.filter(ev => (typeof ev.source==='object'?ev.source.id:ev.source)===d.id).length;
  tip.innerHTML = `<b style="color:${CLUSTER_COLORS[d.cluster]}">${d.label}</b><small>Type: ${d.type} · Cluster: ${d.cluster}<br>→ ${outDeg} sortants  ← ${inDeg} entrants</small>`;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top = (e.clientY - 10) + 'px';
}
function hideTip() { tip.style.display = 'none'; }

// ── RESIZE ──────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  simulation.force('center', d3.forceCenter(window.innerWidth/2, (window.innerHeight-52)/2));
  simulation.alpha(.2).restart();
});

// Initial zoom to fit
setTimeout(() => {
  const bounds = g.node().getBBox();
  const fullW = window.innerWidth, fullH = window.innerHeight - 52;
  const scale = Math.min(.9, .9 / Math.max(bounds.width/fullW, bounds.height/fullH));
  const tx = (fullW - bounds.width * scale) / 2 - bounds.x * scale;
  const ty = (fullH - bounds.height * scale) / 2 - bounds.y * scale + 52;
  svg.transition().duration(1200).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}, 2500);
</script>
</body>
